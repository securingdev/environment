# Terminal settings optimized for Ghostty
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*256col*:RGB"

# Enable true color support
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",*:usstyle"

# Set the prefix key to Ctrl+a (like screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Set window splitting keys
bind | split-window -h
bind - split-window -v

# Set window navigation keys (like screen)
# bind C-a last-window
bind a send-prefix
bind ' ' next-window
bind A command-prompt "rename-window %%"
bind ^N next-window
bind ^P previous-window
bind c new-window
bind k confirm-before -p "kill-window #W? (y/n)" kill-window
bind K kill-window
bind ^K kill-window

# Add screen-like pane navigation
bind Tab select-pane -t :.+  # Similar to screen's Ctrl+a Tab
bind ^A last-pane          # Toggle between current and previous pane

# Window selection (like screen's number keys)
bind 0 select-window -t :0
bind 1 select-window -t :1
bind 2 select-window -t :2
bind 3 select-window -t :3
bind 4 select-window -t :4
bind 5 select-window -t :5
bind 6 select-window -t :6
bind 7 select-window -t :7
bind 8 select-window -t :8
bind 9 select-window -t :9

# Other screen-like bindings
bind ^D detach-client
bind d detach-client
bind ^C new-window

# Status bar configuration to match your sc  setup
set -g status on
set -g status-position bottom
set -g status-style bg=default,fg=colour10  # kC in screen = cyan on black

# Turn off startup message
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g monitor-activity off
set -g bell-action none

# Format status bar similar to your screen hardstatus
set -g status-left " "
set -g status-right " #H #[fg=colour0] %m/%d "
set -g status-justify left
set -g window-status-format " #[fg=colour15]#I #W "
set -g window-status-current-format " #[fg=colour1,bg=colour0,bold]#I #W "  #

# Make the dividing line bold
set -g pane-border-style fg=colour0
set -g pane-active-border-style fg=colour0,bold

# Turn on alternate screen (similar to altscreen)
set -g alternate-screen on

# Scrollback settings
set -g history-limit 30000

# Easy copy mode entry (like screen's C-a Escape)
unbind [ 
bind Escape copy-mode

# Enable vim-style copy mode
setw -g mode-keys vi

# Vim-style copy mode bindings
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# More screen-like window navigation
bind-key C-a last-window

# Optional: Make sure you can still send C-a to inner sessions
bind a send-prefix

